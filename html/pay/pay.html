<body>
    <div class="payment-container">
        <h1>Pagina di Pagamento</h1>
        <form id="paymentForm">
            <div class="form-group">
                <label for="cardName">Titolare della Carta</label>
                <input type="text" id="cardName" name="cardName" required>
            </div>
            
            <div class="form-group">
                <label for="cardNumber">Numero Carta</label>
                <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="expiry">Data Scadenza</label>
                    <input type="text" id="expiry" name="expiry" placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" name="cvv" maxlength="3" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="amount">Importo</label>
                <input type="number" id="amount" name="amount" placeholder="€ 0.00" step="0.01" min="0" required>
            </div>
            
            <button type="submit" class="btn-pay">Paga Ora</button>
        </form>
    </div>

    <style>
        .payment-container { max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        .btn-pay { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</body>
