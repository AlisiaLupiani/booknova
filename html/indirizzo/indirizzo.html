<body>
    <div class="payment-container">
        <h1>Modifica indirizzo</h1>
        <form id="paymentForm">
            <div class="form-group">
                <label for="cityName">Città</label>
                <input type="text" id="cityName" name="cityName" required>
            </div>
            
            <div class="form-group">
                <label for="provinciq">Provincia</label>
                <input type="text" id="provincia" name="provincia"   required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="cap">Cap</label>
                    <input type="text" id="cap" name="cap"  maxlength="5" required>
                </div>
                <div class="form-group">
                    <label for="via">Via</label>
                    <input type="text" id="via" name="via"  required>
                </div>
            </div>
            
    
            
            <button type="submit" class="btn-pay">Modifica</button>
        </form>
    </div>

    <style>
        .payment-container { max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        .btn-pay { width: 100%; padding: 10px; background-color: #917777; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</body>
