<body>
    <div class="container">
        <h1>Carrello d'Acquisto</h1>
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Prodotto</th>
                    <th>Prezzo</th>
                    <th>Quantità</th>
                    <th>Totale</th>
                    <th>Azione</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                <[foreach]>
                <tr>
                    <td><[booktitle]></td>
                    <td>€<[price]></td>
                    <td><input type="number" value="<[quantity]>" min="1"></td>
                    <td>€<[total]></td>
                    <td><button>Rimuovi</button></td>
                </tr>
                <[/foreach]>
            </tbody>
        </table>
        <div class="cart-summary">
            <p>Subtotale: <strong>€19.99</strong></p>
            <p>Spedizione: <strong>€5.00</strong></p>
            <p>Totale: <strong>€24.99</strong></p>
        </div>
        <div class="cart-actions">
            <a href="catalougues.php" class="btn-continue">Continua Acquisti</a>
        </div>
        <div>
            <a href="pay.php" class="btn-checkout">Procedi al Pagamento</a></div>
        </div>
    </div>
</body>
