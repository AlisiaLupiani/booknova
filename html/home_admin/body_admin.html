<body>
    
        <section id="hero-azioni">
            <h1>Crea, gestisci e pubblica</h1>
            <p>Inizia un nuovo progetto o riprendi da dove avevi interrotto.</p>
            
            <div class="crea-nuovo">
                <h3>Crea un nuovo titolo</h3>
                <button type="button" onclick="location.href='/nuovo-libro'">+ eBook Kindle</button>

        <section id="libreria">
            <h2>La tua libreria</h2>

                        <button>Continua configurazione</button>

                    </div>
                </div>
            </div>
